; ════════════════════════════════════════════════════════════════════
; PHP 8.4 — Overrides de Produção
; CodifyTech | Laravel 12 API
;
; Este arquivo é carregado APÓS o serversideup-docker-php.ini.
; O prefixo 99- garante precedência sobre todos os outros arquivos .ini.
;
; Foco: OPcache + JIT (não configurados pelo serversideup por padrão),
;       segurança, timezone e otimizações de I/O.
; ════════════════════════════════════════════════════════════════════

[PHP]

; ── Segurança ─────────────────────────────────────────────────────────
; Não expor versão do PHP em headers HTTP (X-Powered-By)
expose_php        = Off
; Bloquear inclusão remota de arquivos
allow_url_fopen   = Off
allow_url_include = Off

; ── Erros: apenas log, nunca exibir ao cliente ────────────────────────
display_errors         = Off
display_startup_errors = Off
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors             = On
; /proc/1/fd/2 → stderr do PID 1 (S6) — Docker captura automaticamente
error_log              = /proc/1/fd/2
ignore_repeated_errors = On

; ── Performance de I/O ────────────────────────────────────────────────
; Elimina chamadas stat() repetidas para resolver caminhos de arquivo
realpath_cache_size = 4096K
realpath_cache_ttl  = 600

; ── Sessão (segurança base — Laravel usa Redis via config/session.php) ─
session.cookie_httponly = 1
session.cookie_secure   = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1
session.gc_maxlifetime  = 7200

[Date]
; Forçar timezone — nunca depender do padrão do sistema
date.timezone = America/Sao_Paulo

; ════════════════════════════════════════════════════════════════════
; OPcache + JIT
;
; A imagem serversideup inclui opcache mas:
;   1. Deixa desabilitado por padrão (controle via PHP_OPCACHE_ENABLE=1)
;   2. NÃO configura JIT
;   3. Não aplica as otimizações máximas de produção
;
; Este bloco ativa e configura TUDO, sobrescrevendo os defaults.
; ════════════════════════════════════════════════════════════════════
[opcache]

; Habilitar (garante ON independente do valor ENV da imagem)
opcache.enable     = 1
; Necessário para que artisan e scripts CLI também se beneficiem
opcache.enable_cli = 1

; ── Memória compartilhada (entre todos os workers PHP-FPM) ───────────
; Aumentar se opcache_get_status() mostrar alta % de uso
opcache.memory_consumption      = 256
opcache.interned_strings_buffer = 16
; Cobre vendor + todas as classes da aplicação (DDD incluso)
opcache.max_accelerated_files   = 20000
opcache.max_wasted_percentage   = 10

; ── Produção: SEM validação de timestamps ────────────────────────────
; Arquivos são imutáveis em containers — eliminar stat() por request
; ATENÇÃO: exige rebuild da imagem para atualizar código
opcache.validate_timestamps = 0
opcache.revalidate_freq     = 0

; Necessário para PHPDoc annotations, atributos PHP 8.x, JWT, Doctrine, etc.
opcache.save_comments = 1

; ── Otimizações adicionais ────────────────────────────────────────────
; Huge pages (TLB): melhor performance de CPU para lookup de código compilado
; Se o kernel da hospedagem não suportar, comente esta linha
opcache.huge_code_pages    = 1
; Habilitar todas as otimizações de bytecode disponíveis no PHP 8.x
opcache.optimization_level = 0x7FFEBFFF

; ── JIT — PHP 8.4 ─────────────────────────────────────────────────────
; Buffer de memória dedicado ao compilador JIT
opcache.jit_buffer_size = 128M
;
; A partir do PHP 8.4, a configuração utiliza strings descritivas:
;   tracing  → rastreia "hot paths" em runtime — melhor para APIs (equivale ao antigo 1255)
;   function → compila por função — mais conservador, mais estável (equivale ao antigo 1205)
;
; PHP 8.4 + PHP-FPM: 'tracing' é estável e o mais recomendado para performance.
; Se observar comportamento inesperado, mude para 'function'.
opcache.jit = tracing